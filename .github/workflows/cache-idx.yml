name: Cache IDX Financial Reports

on:
  schedule:
    - cron: '0 1 * * 1'  # Every Monday at 01:00 UTC
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: write

jobs:
  cache-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch IDX Reports via CF Worker
        run: |
          mkdir -p api

          CF_WORKER="https://idx-proxy.rengga-aditya828.workers.dev"
          IDX_BASE="https://www.idx.co.id/primary/ListedCompany/GetFinancialReport"

          TICKERS="BBCA BBRI BMRI TLKM ASII UNVR PGEO BRPT ANTM INDF PGAS WSKT ADRO PTBA ICBP KLBF HMSP JPFA CPIN SMGR"
          YEARS="2024 2025 2026"
          PERIODS="tw1 tw2 tw3 audit"

          for TICKER in $TICKERS; do
            for YEAR in $YEARS; do
              for PERIOD in $PERIODS; do
                FILE="api/${TICKER}_${YEAR}_${PERIOD}.json"
                IDX_URL="${IDX_BASE}?indexFrom=0&pageSize=10&year=${YEAR}&reportType=rdf&periode=${PERIOD}&kodeEmiten=${TICKER}"
                PROXY_URL="${CF_WORKER}?url=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$IDX_URL")"

                echo "Fetching $TICKER $YEAR $PERIOD via proxy..."
                RESPONSE=$(curl -s \
                  --connect-timeout 15 \
                  --max-time 30 \
                  "$PROXY_URL" 2>/dev/null)

                if echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); exit(0 if d.get('Results') else 1)" 2>/dev/null; then
                  echo "$RESPONSE" > "$FILE"
                  echo "Saved $FILE"
                else
                  echo "No data for $TICKER $YEAR $PERIOD"
                fi

                sleep 0.5
              done
            done
          done

      - name: Commit cache files
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update IDX report cache [skip ci]"
            git push
          fi
